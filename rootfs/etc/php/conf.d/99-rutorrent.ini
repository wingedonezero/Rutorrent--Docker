; Arch's php already bundles curl + mbstring (built-in) — only enable the extra
; loadable modules ruTorrent uses.
extension=gd
extension=sockets
extension=iconv

; ruTorrent needs this ON or several plugins misbehave
register_argc_argv = On

; Sensible defaults (date.timezone is overwritten from the TZ env at runtime)
date.timezone = UTC
memory_limit = 256M
upload_max_filesize = 100M
post_max_size = 100M
