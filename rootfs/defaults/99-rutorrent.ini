; PHP settings for ruTorrent — editable at /config/php/99-rutorrent.ini (your edits persist).
; (Timezone is handled separately from the TZ env var, in /etc/php/conf.d/00-timezone.ini.)

; Arch's php bundles curl + mbstring (built-in) — only enable the extra loadable modules.
extension=gd
extension=sockets
extension=iconv

; ruTorrent needs this ON or several plugins misbehave
register_argc_argv = On

memory_limit = 256M
upload_max_filesize = 100M
post_max_size = 100M
