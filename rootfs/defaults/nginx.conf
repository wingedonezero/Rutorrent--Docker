user rtorrent;
worker_processes auto;
pid /run/nginx.pid;

# nginx errors go to a file in your appdata (and to the container log / Unraid "Logs" button)
error_log /config/log/nginx-error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    types_hash_max_size 4096;
    types_hash_bucket_size 128;

    # access log: to a file in appdata AND to stdout (so the Unraid "Logs" button shows activity)
    access_log /config/log/nginx-access.log;
    access_log /dev/stdout;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 100m;        # allow uploading large .torrent files
    server_tokens off;

    # don't kill the rtorrent xmlrpc request just because the browser navigated away
    fastcgi_read_timeout 120s;

    server {
        listen 8080 default_server;
        server_name _;

        root /var/www/rutorrent;
        index index.php index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            include /etc/nginx/fastcgi.conf;
            fastcgi_pass unix:/run/php-fpm/php-fpm.sock;
        }

        # ruTorrent keeps its own data out of the webroot listing
        location ~ /\.(?!well-known) { deny all; }
    }
}
